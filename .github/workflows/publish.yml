name: Publish to npm

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # npm trusted publishing (OIDC)

concurrency:
  group: npm-publish
  cancel-in-progress: false

jobs:
  publish:
    name: Test and publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Reads the pnpm version from package.json's "packageManager" field.
      - uses: pnpm/action-setup@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      # Trusted publishing needs npm >= 11.5.1; Node 22 ships an older one.
      - name: Update npm for OIDC support
        run: npm install -g npm@latest

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test
        run: pnpm test

      # Re-pushed tags for versions already on the registry skip publishing
      # instead of failing the run.
      - name: Check registry for this version
        id: check
        run: |
          NAME=$(node -p "require('./package.json').name")
          VERSION=$(node -p "require('./package.json').version")
          if npm view "$NAME@$VERSION" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$NAME@$VERSION is already on npm — skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      # prepublishOnly re-runs tests and the minified build.
      - name: Publish
        if: steps.check.outputs.published == 'false'
        run: npm publish
